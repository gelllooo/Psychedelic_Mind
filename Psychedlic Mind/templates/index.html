<!DOCTYPE html>
<html>
<head>
    <title>Psychedlic Mind</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>📓 Psychedlic Mind</h1>
<h1>Welcome to the Island of Misfit Toys</h1>


{% for post in posts %}
<div class="card">
    <h2>{{ post.title }}</h2>
    <p class="date">{{ post.date }}</p>

    {% if post.image %}
        <img src="{{ url_for('static', filename='uploads/' + post.image) }}" width="200">
    {% endif %}

    <p>{{ post.content[:120] }}...</p>
    <a href="/post/{{ post.id }}">Read more →</a>
</div>
{% endfor %}

</body>
</html>

<div style="text-align:center;">
    <a href="/create">➕ New Entry</a> |
    <a href="/albums">📁 Albums</a>
</div>
